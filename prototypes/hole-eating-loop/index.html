<!DOCTYPE html>
<!-- PROTOTYPE - NOT FOR PRODUCTION -->
<!-- Question: Is the free-eating + target-completion loop satisfying? -->
<!--           Does 10-level point-threshold growth feel strategic and rewarding? -->
<!-- Date: 2026-03-30 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry Void — Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// PROTOTYPE - NOT FOR PRODUCTION
// Question: Is the free-eating + target-completion loop satisfying?
//           Does 10-level point-threshold growth produce rewarding unlock moments?
// Date: 2026-03-30

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CFG = {
  holeLevels:      10,
  holeBaseR:       22,
  holeLevelGrowth: 16,    // px radius added per level
  eatRatio:        0.85,  // hole must be > obj.r / eatRatio to eat
  trackSpeed:      9,     // hole-to-mouse responsiveness
  gameDuration:    90,    // seconds
  // Cumulative points to reach level N (index = level - 1, so [0]=start of lv1)
  thresholds: [0, 130, 320, 590, 960, 1440, 2040, 2780, 3670, 4720],
};

function holeR(lvl) { return CFG.holeBaseR + (lvl - 1) * CFG.holeLevelGrowth; }
// lv1=22, lv3=54, lv6=102, lv9=150, lv10=166

// ─── STATE ───────────────────────────────────────────────────────────────────
let mouse  = { x: W / 2, y: H / 2 };
let hole, objects, effects, ui, metrics;
let state  = 'ready'; // ready | playing | win | lose

function resetState() {
  hole    = { x: W / 2, y: H / 2, level: 1, points: 0, flash: 0, scl: 1 };
  effects = [];
  ui      = { targetsEaten: 0, timeLeft: CFG.gameDuration, eatCount: 0 };
  metrics = { events: [], levelUpMs: [], t0: performance.now() };
  spawnObjects();
  state = 'playing';
}

// ─── SPAWN ───────────────────────────────────────────────────────────────────
function safePos(r) {
  for (let i = 0; i < 80; i++) {
    const x = r + 60 + Math.random() * (W - r * 2 - 120);
    const y = r + 60 + Math.random() * (H - r * 2 - 120);
    if (Math.hypot(x - W / 2, y - H / 2) > 200) return { x, y };
  }
  return { x: r + 60 + Math.random() * (W - r * 2 - 120),
           y: r + 60 + Math.random() * (H - r * 2 - 120) };
}

function spawnObjects() {
  objects = [];
  // Scale density with screen area (baseline 1200×750)
  const k = Math.max(0.65, (W * H) / 900000);

  function add(n, rMin, rMax) {
    for (let i = 0; i < Math.round(n * k); i++) {
      const r = rMin + Math.random() * (rMax - rMin);
      const p = safePos(r);
      objects.push({ x: p.x, y: p.y, r, isTarget: false, eaten: false });
    }
  }

  add(55, 6,  13);  // tiny   — feed levels 1-2
  add(22, 16, 30);  // small  — feed levels 2-4
  add(11, 34, 55);  // medium — feed levels 4-7
  add(5,  65, 95);  // large  — feed levels 7-9

  // Targets — sized to require specific levels, placed in different quadrants:
  //  r=45  → need holeR >= 53  → level 3  (holeR@3 = 54)  — top-right quadrant
  //  r=85  → need holeR >= 100 → level 6  (holeR@6 = 102) — bottom-right quadrant
  //  r=108 → need holeR >= 127 → level 8  (holeR@8 = 134) — left half
  // FIX: was r=122 (needed level 9 = 77% of all points); reduced to r=108 (level 8)
  // FIX: quadrant-based placement prevents all targets clustering in one corner
  const targetDefs = [
    { r: 45,  xMin: W*0.55, xMax: W*0.9,  yMin: H*0.1,  yMax: H*0.45 }, // top-right
    { r: 85,  xMin: W*0.55, xMax: W*0.9,  yMin: H*0.55, yMax: H*0.9  }, // bottom-right
    { r: 108, xMin: W*0.1,  xMax: W*0.45, yMin: H*0.2,  yMax: H*0.8  }, // left half
  ];
  for (const def of targetDefs) {
    let x, y, attempts = 0;
    do {
      x = def.xMin + Math.random() * (def.xMax - def.xMin);
      y = def.yMin + Math.random() * (def.yMax - def.yMin);
      attempts++;
    } while (Math.hypot(x - W/2, y - H/2) < 200 && attempts < 40);
    objects.push({ x, y, r: def.r, isTarget: true, eaten: false });
  }
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
const SIZE_COLORS = ['#4ade80', '#a3e635', '#facc15', '#fb923c', '#f87171'];
function sizeColor(r) {
  return SIZE_COLORS[Math.min(SIZE_COLORS.length - 1, Math.floor((r / 110) * SIZE_COLORS.length))];
}

function drawObjects() {
  const hr = holeR(hole.level);
  for (const o of objects) {
    if (o.eaten) continue;
    const edible = o.r <= hr * CFG.eatRatio;
    ctx.save();
    if (o.isTarget) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.004);
      ctx.shadowColor = '#c084fc';
      ctx.shadowBlur  = 10 + pulse * 20;
      ctx.fillStyle   = edible ? '#ede9fe' : '#6d28d9';
      ctx.strokeStyle = '#ddd6fe';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur    = 0;
      ctx.fillStyle     = edible ? '#4c1d95' : '#ede9fe';
      ctx.font          = `bold ${Math.round(o.r * 0.65)}px sans-serif`;
      ctx.textAlign     = 'center';
      ctx.textBaseline  = 'middle';
      ctx.fillText('★', o.x, o.y);
    } else {
      const c = sizeColor(o.r);
      if (edible) { ctx.shadowColor = c; ctx.shadowBlur = 7; }
      ctx.fillStyle = edible ? c : '#252538';
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawHole() {
  const r = holeR(hole.level) * hole.scl;
  ctx.save();
  if (hole.flash > 0) { ctx.shadowColor = '#c084fc'; ctx.shadowBlur = 50 * hole.flash; }
  const g = ctx.createRadialGradient(hole.x, hole.y, 0, hole.x, hole.y, r);
  g.addColorStop(0,    '#000000');
  g.addColorStop(0.6,  '#07071a');
  g.addColorStop(1,    '#1e1b4b');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = `rgba(139,92,246,${0.3 + hole.flash * 0.7})`;
  ctx.lineWidth   = 2 + hole.flash * 4;
  ctx.stroke();
  ctx.restore();
}

function drawEffects() {
  for (const e of effects) {
    ctx.save();
    ctx.globalAlpha  = e.life;
    ctx.strokeStyle  = e.color;
    ctx.lineWidth    = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * (1.4 - e.life * 0.4), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawHUD() {
  const lvl  = hole.level;
  const thr  = CFG.thresholds;
  const prev = thr[lvl - 1] ?? 0;
  const next = lvl >= CFG.holeLevels ? prev + 1 : thr[lvl];
  const prog = lvl >= CFG.holeLevels ? 1 : (hole.points - prev) / (next - prev);

  const BW = Math.min(300, W * 0.26);
  const bx = W / 2 - BW / 2, by = 16, BH = 13;

  ctx.save();

  // Timer
  const secs = Math.floor(ui.timeLeft);
  ctx.font      = 'bold 26px monospace';
  ctx.fillStyle = ui.timeLeft < 15 ? '#f87171' : '#f1f5f9';
  ctx.textAlign = 'left';
  ctx.fillText(`${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, '0')}`, 18, 34);

  // Level label
  ctx.font      = 'bold 14px sans-serif';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(`LV ${lvl}${lvl >= CFG.holeLevels ? ' MAX' : ''}`, 18, 54);

  // Progress bar background
  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(bx, by, BW, BH, 6) : ctx.rect(bx, by, BW, BH);
  ctx.fill();

  // Progress bar fill
  const fw = BW * Math.max(0, Math.min(1, prog));
  if (fw > 1) {
    ctx.fillStyle    = '#7c3aed';
    ctx.shadowColor  = '#a78bfa';
    ctx.shadowBlur   = 5;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx, by, fw, BH, 6) : ctx.rect(bx, by, fw, BH);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Targets
  ctx.font      = '14px sans-serif';
  ctx.fillStyle = '#e2e8f0';
  ctx.textAlign = 'right';
  ctx.fillText(`Targets ${ui.targetsEaten}/3`, W - 18, 34);
  for (let i = 0; i < 3; i++) {
    ctx.font      = '21px sans-serif';
    ctx.fillStyle = i < ui.targetsEaten ? '#c084fc' : '#2d2d4a';
    ctx.fillText('★', W - 14 - i * 27, 59);
  }

  ctx.restore();
}

function drawOverlay() {
  if (state === 'ready') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font      = `bold ${Math.round(W * 0.052)}px sans-serif`;
    ctx.fillStyle = '#a78bfa';
    ctx.fillText('HUNGRY VOID', W / 2, H / 2 - 65);
    ctx.font      = `${Math.round(W * 0.018)}px sans-serif`;
    ctx.fillStyle = '#c4b5fd';
    ctx.fillText('Move your cursor to steer the hole', W / 2, H / 2 - 8);
    ctx.fillText('Eat anything your size — devour all ★ targets to win', W / 2, H / 2 + 28);
    ctx.font      = `bold ${Math.round(W * 0.02)}px sans-serif`;
    ctx.fillStyle = '#f1f5f9';
    ctx.fillText('Click to start', W / 2, H / 2 + 78);
    ctx.restore();
    return;
  }
  if (state === 'win' || state === 'lose') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font      = `bold ${Math.round(W * 0.05)}px sans-serif`;
    ctx.fillStyle = state === 'win' ? '#a78bfa' : '#f87171';
    ctx.fillText(state === 'win' ? 'DEVOURED!' : "TIME'S UP", W / 2, H / 2 - 38);
    ctx.font      = `${Math.round(W * 0.018)}px sans-serif`;
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(
      state === 'win'
        ? `Time left: ${Math.floor(ui.timeLeft)}s  ·  Ate ${ui.eatCount} objects`
        : `Targets: ${ui.targetsEaten}/3  ·  Ate ${ui.eatCount} objects`,
      W / 2, H / 2 + 16
    );
    ctx.fillText('Click to play again', W / 2, H / 2 + 55);
    ctx.restore();
  }
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  // Track mouse
  const spd = CFG.trackSpeed;
  hole.x += (mouse.x - hole.x) * Math.min(1, spd * dt);
  hole.y += (mouse.y - hole.y) * Math.min(1, spd * dt);
  const r  = holeR(hole.level);
  hole.x   = Math.max(r, Math.min(W - r, hole.x));
  hole.y   = Math.max(r, Math.min(H - r, hole.y));

  // Decay level-up flash + scale pop
  hole.flash = Math.max(0, hole.flash - dt * 2.2);
  hole.scl   = 1 + (hole.scl - 1) * Math.max(0, 1 - dt * 10);

  // Timer
  ui.timeLeft = Math.max(0, ui.timeLeft - dt);
  if (ui.timeLeft === 0) { state = 'lose'; return; }

  // Eat check
  const hr = holeR(hole.level);
  for (const o of objects) {
    if (o.eaten) continue;
    if (o.r > hr * CFG.eatRatio) continue;
    const dist = Math.hypot(hole.x - o.x, hole.y - o.y);
    if (dist >= hr * 0.9) continue;

    o.eaten = true;
    ui.eatCount++;
    const pts = Math.round(o.r * 2.2);
    hole.points += pts;
    metrics.events.push({
      ms: Math.round(performance.now() - metrics.t0),
      pts, r: Math.round(o.r), lv: hole.level, target: o.isTarget,
    });
    effects.push({ x: o.x, y: o.y, r: o.r,
      color: o.isTarget ? '#c084fc' : '#818cf8', life: 1 });

    if (o.isTarget) {
      ui.targetsEaten++;
      if (ui.targetsEaten >= 3) { state = 'win'; return; }
    }

    // Level-up
    while (hole.level < CFG.holeLevels &&
           hole.points >= CFG.thresholds[hole.level]) {
      hole.level++;
      hole.flash = 1;
      hole.scl   = 1.28;
      metrics.levelUpMs.push(Math.round(performance.now() - metrics.t0));
    }
  }

  // Decay effects
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].life -= dt * 3;
    if (effects[i].life <= 0) effects.splice(i, 1);
  }
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  if (state !== 'ready') {
    drawObjects();
    drawEffects();
    drawHole();
    drawHUD();
  }

  drawOverlay();
  update(dt);
  requestAnimationFrame(loop);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('click',     () => {
  if (state !== 'playing') resetState();
});
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ─── INIT ────────────────────────────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
</body>
</html>
